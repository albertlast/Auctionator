name: Sync Upstream and Release

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and detect changes
        id: sync
        run: |
          git remote add upstream https://github.com/TheMouseNest/Auctionator.git
          git fetch upstream
          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git merge upstream/master --no-edit
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged changes
        if: steps.sync.outputs.changed == 'true'
        run: git push origin master

      - name: Read version from TOC
        if: steps.sync.outputs.changed == 'true'
        id: ver
        run: |
          VERSION=$(grep -m1 "^## Version:" Auctionator.toc | sed 's/.*Version: *//')
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            git tag "$TAG"
          fi

      - name: Build and publish GitHub Release
        if: steps.sync.outputs.changed == 'true' && steps.ver.outputs.tag_exists == 'false'
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
